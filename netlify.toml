# Netlify config for Angular frontend only.
# The Node/Express API must be hosted elsewhere (Render, Railway, etc.).

[build]
  command = "npm run build"
  publish = "dist/angular15-signup-verify-mongodb"

# Ensure Angular client-side routes work (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: set Node version for the build environment
[build.environment]
  NODE_VERSION = "18"
