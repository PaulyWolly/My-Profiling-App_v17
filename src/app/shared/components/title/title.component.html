<div *ngIf="appHeader; else normalTitle" class="app-header">
  <h1 class="app-title">{{ text }}</h1>
</div>
<ng-template #normalTitle>
  <div [ngClass]="titleClasses">
    <ng-container [ngSwitch]="level">
      <h1 *ngSwitchCase="1">{{ text }}</h1>
      <!-- Use ng-template for the default case -->
      <ng-template ngSwitchCase="2"><h2>{{ text }}</h2></ng-template>
      <h2 *ngSwitchDefault>{{ text }}</h2> 
      <h3 *ngSwitchCase="3">{{ text }}</h3>
      <h4 *ngSwitchCase="4">{{ text }}</h4>
      <h5 *ngSwitchCase="5">{{ text }}</h5>
      <h6 *ngSwitchCase="6">{{ text }}</h6>
    </ng-container>
    <p *ngIf="subtitle" class="title-subtitle">{{ subtitle }}</p>
  </div>
</ng-template>
