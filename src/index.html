    <style>
        /* Hide scrollbars by default, but allow them in specific places */
        html, body {
            overflow: hidden !important;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        /* Hidden scrollbars by default for most elements */
        *:not(app-edit .col-md-8 *):not(app-add-edit .col-md-8 *) {
            /* scrollbar-width: none; // <--- removed to "ALLOW" scrollbars */
            -ms-overflow-style: none;
        }
        
        /* Hide default scrollbars except for specific components */
        *:not(app-edit .col-md-8 *):not(app-add-edit .col-md-8 *)::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }
        
        /* Ensure specific display of scrollbars in the right column of edit pages */
        app-edit .col-md-8 .scrollable-form-container,
        app-add-edit .col-md-8 .scrollable-form-container {
            overflow-y: auto !important;
        }
    </style>
</head>
