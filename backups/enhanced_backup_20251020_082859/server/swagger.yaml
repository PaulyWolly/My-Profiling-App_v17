openapi: 3.0.0
info:
  title: Angular 15 Signup Verification API
  description: Node.js + MongoDB API for Angular signup verification
  version: 1.0.0
servers:
  - url: http://localhost:4000
    description: Development server
paths:
  /accounts/authenticate:
    post:
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Authentication successful
  /accounts/refresh-token:
    post:
      summary: Refresh JWT token
      responses:
        '200':
          description: Token refresh successful
  /accounts/revoke-token:
    post:
      summary: Revoke refresh token
      responses:
        '200':
          description: Token revoked successfully
  /accounts/register:
    post:
      summary: Register new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                confirmPassword:
                  type: string
                acceptTerms:
                  type: boolean
      responses:
        '200':
          description: Registration successful
  /accounts/verify-email:
    post:
      summary: Verify email address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Email verification successful
  /accounts/{id}/upload-image:
    put:
      summary: Upload profile image
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                profileImage:
                  type: string
                  format: binary
      responses:
        '200':
          description: Image upload successful
  /accounts:
    get:
      summary: Get all accounts (admin only)
      responses:
        '200':
          description: List of all accounts
    post:
      summary: Create new account (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: Account created successfully
  /accounts/{id}:
    get:
      summary: Get account by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account details
    put:
      summary: Update account
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: Account updated successfully
    delete:
      summary: Delete account
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account deleted successfully 