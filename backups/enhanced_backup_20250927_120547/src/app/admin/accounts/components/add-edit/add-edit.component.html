<app-new-account-edit 
  [account]="account" 
  [loading]="loading"
  [submitted]="submitted"
  [submitting]="submitting"
  [isAdmin]="true"
  [isAdminView]="true"
  [currentUserRole]="currentUserRole"
  (save)="onSave($event)" 
  (cancel)="onCancel()"
  (imageChange)="onImageChange($event)"
  (imageRemove)="onImageRemove()">
</app-new-account-edit>

<!-- Image Conflict Dialog -->
<div *ngIf="imageConflict" class="alert alert-warning mt-2">
  <p>{{imageConflictMessage}}</p>
  <div class="mt-2">
    <button type="button" 
            class="btn btn-warning me-2" 
            (click)="confirmOverwrite()">
      Overwrite
    </button>
    <button type="button" 
            class="btn btn-secondary" 
            (click)="cancelOverwrite()">
      Cancel
    </button>
  </div>
</div>

<!-- Error Message -->
<div *ngIf="error" class="alert alert-danger mt-2">
  {{error}}
</div>
