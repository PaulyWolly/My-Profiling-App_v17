<div class="layout-container">
    <!-- Header with template buttons and user navigation - hidden on account settings -->
    <div class="profile-header" *ngIf="!isAccountSettingsRoute()">
        <div class="template-selector">
            <span class="template-label">Template:</span>
            <button mat-button color="primary" class="template-btn" [class.active-template]="isTemplateActive('STANDARD')" (click)="selectTemplate('standard')">Standard</button>
            <button mat-button color="accent" class="template-btn" [class.active-template]="isTemplateActive('BUSINESS_CARD')" (click)="selectTemplate('business-card')">Business</button>
            <button mat-button color="warn" class="template-btn" [class.active-template]="isTemplateActive('SOCIAL_MEDIA')" (click)="selectTemplate('social-media')">Social Media</button>
        </div>
        
        <!-- User account actions -->
        <div class="user-actions">
            <button mat-button color="primary" (click)="goToEditProfile()">
                <mat-icon>edit</mat-icon> Edit Profile
            </button>
            <button mat-button color="accent" [routerLink]="['/profile/account-settings']">
                <mat-icon>settings</mat-icon> Account Settings
            </button>
        </div>
    </div>

    <!-- Main content -->
    <div class="content-container">
        <router-outlet></router-outlet>
    </div>
</div>
