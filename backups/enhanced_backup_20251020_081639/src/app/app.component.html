<!-- Main application container -->
<div class="app-container" [ngClass]="{ 'bg-light': account && account.role === Role.Admin }">
    <!-- Header with navigation -->
    <app-new-menu-bar [account]="account"></app-new-menu-bar>

    <!-- Conditional subnav -->
    <ng-container [ngSwitch]="getSubnavType()">
      <app-admin-subnav *ngSwitchCase="'admin'"></app-admin-subnav>
      <app-super-admin-subnav *ngSwitchCase="'super-admin'"></app-super-admin-subnav>
    </ng-container>

    <!-- Main content area -->
    <div class="main-content-wrapper">
        <!-- global alert -->
        <alert></alert>
        <router-outlet></router-outlet>
    </div>

    <!-- Footer component -->
    <app-footer class="app-footer"></app-footer>

</div>
