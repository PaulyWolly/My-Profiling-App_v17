<div class="profile-templates-container">
    <h2>Profile Templates</h2>
    <div class="templates-grid">
        <div *ngFor="let template of templates" 
             class="template-card" 
             [class.active]="currentTemplate === template.id"
             (click)="selectTemplate(template.id)">
            <div class="template-content">
                <h3>{{ template.name }}</h3>
                <p>{{ template.description }}</p>
                <div class="template-preview">
                    <img [src]="template.thumbnailUrl" [alt]="template.name + ' thumbnail'" class="thumbnail" />
                    <!-- <img [src]="template.previewUrl" [alt]="template.name + ' preview'" class="preview" /> -->
                    <img [src]="template.previewUrl" [alt]="template.name + ' preview'" class="preview" />
                </div>
            </div>
            <div class="template-overlay">
                <button class="select-btn">Select Template</button>
            </div>
        </div>
    </div>
</div>
