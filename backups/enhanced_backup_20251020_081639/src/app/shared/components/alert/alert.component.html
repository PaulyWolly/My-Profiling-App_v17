<div *ngIf="alerts.length" class="alert-container">
    <div *ngFor="let alert of alerts" class="{{cssClasses(alert)}}">
        <div class="alert-content">
            <i class="{{getAlertIcon(alert)}}"></i>
            <span class="alert-message" [innerHTML]="alert.message"></span>
        </div>
        
        <!-- Action buttons if provided -->
        <div *ngIf="alert.buttons && alert.buttons.length" class="alert-actions mt-2">
            <button *ngFor="let button of alert.buttons" 
                    (click)="onButtonClick(button, alert)"
                    class="btn {{ button.cssClass || 'btn-outline-secondary' }} me-2">
                {{ button.text }}
            </button>
        </div>
        
        <button class="btn-close" (click)="removeAlert(alert)">×</button>
    </div>
</div>
